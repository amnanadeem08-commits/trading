name: Dependencies

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]"
      - run: python scripts/validate_dependencies.py
