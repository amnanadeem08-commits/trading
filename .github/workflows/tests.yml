name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/unit tests/ml tests/ai tests/decision tests/risk tests/execution tests/connectors tests/paper tests/historical tests/market_data tests/feature_engineering tests/feature_store tests/training_pipeline tests/model_registry tests/inference_pipeline tests/ml_runtime tests/ml_engine_plugins tests/framework_adapters tests/artifact_management tests/storage_providers tests/contract tests/architecture tests/integration -v
