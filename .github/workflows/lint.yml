name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: python -m ruff check models config historical market_data feature_engineering feature_store training_pipeline model_registry inference_pipeline ml_runtime ml_engine_plugins framework_adapters artifact_management storage_providers connectors events versioning audit feature_flags research architecture health metrics platform_logging security notifications monitoring services pipeline workflow data core ml ai decision risk signal_engine paper_trading execution plugins scripts tests

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install black
      - run: python -m black --check models config historical market_data feature_engineering feature_store training_pipeline model_registry inference_pipeline ml_runtime ml_engine_plugins framework_adapters artifact_management storage_providers connectors events versioning audit feature_flags research architecture health metrics platform_logging security notifications monitoring services pipeline workflow data core ml ai decision risk signal_engine paper_trading execution plugins scripts tests
