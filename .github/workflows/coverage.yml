name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]"
      - run: |
          python -m pytest tests/unit tests/ml tests/ai tests/decision tests/risk tests/execution tests/connectors tests/paper tests/historical tests/contract tests/architecture tests/integration -q \
            --cov-fail-under=88 \
            --cov=models --cov=config --cov=historical --cov=connectors --cov=events \
            --cov=versioning --cov=audit --cov=feature_flags --cov=research \
            --cov=architecture --cov=health --cov=metrics --cov=platform_logging \
            --cov=security --cov=notifications --cov=monitoring --cov=services --cov=pipeline --cov=workflow --cov=data --cov=core --cov=ml --cov=ai --cov=decision --cov=risk --cov=execution --cov=plugins \
            --cov-report=term-missing
