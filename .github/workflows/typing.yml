name: Typing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]"
      - run: python -m mypy models config connectors events versioning audit feature_flags research architecture health metrics platform_logging security notifications monitoring services pipeline workflow data core ml ai decision risk execution plugins
