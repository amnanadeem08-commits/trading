include_external_packages = true

[[tool.importlinter.contracts]]
name = "Foundation packages must not import connectors"
type = "forbidden"
source_modules = [
    "models",
    "config",
    "events",
    "versioning",
    "audit",
    "feature_flags",
    "architecture",
    "health",
    "metrics",
    "platform_logging",
    "security",
    "notifications",
    "monitoring",
]
forbidden_modules = ["connectors"]

