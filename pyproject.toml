"notifications/**/*.py" = ["TC001", "TC003"]
"monitoring/**/*.py" = ["TC001", "TC003"]
"services/**/*.py" = ["TC001", "TC003"]
"pipeline/**/*.py" = ["TC001", "TC003"]
"workflow/**/*.py" = ["TC001", "TC003"]
"data/**/*.py" = ["TC001", "TC003"]
"core/**/*.py" = ["TC001", "TC003"]
"ml/**/*.py" = ["TC001", "TC003"]
"ai/**/*.py" = ["TC001", "TC003"]
"decision/**/*.py" = ["TC001", "TC003"]
"risk/**/*.py" = ["TC001", "TC003"]
"signal_engine/**/*.py" = ["TC001", "TC003"]
"paper_trading/**/*.py" = ["TC001", "TC003"]
"execution/**/*.py" = ["TC001", "TC003"]
"plugins/**/*.py" = ["TC001", "TC003"]
"scripts/**/*.py" = ["T201", "E501", "TC003", "UP036", "SIM108", "RUF005", "RUF100", "I001"]

[tool.coverage.run]
source = ["models", "config", "historical", "market_data", "feature_engineering", "feature_store", "training_pipeline", "model_registry", "inference_pipeline", "ml_runtime", "ml_engine_plugins", "framework_adapters", "artifact_management", "storage_providers", "connectors", "events", "versioning", "audit", "feature_flags", "research", "architecture", "health", "metrics", "platform_logging", "security", "notifications", "monitoring", "services", "pipeline", "workflow", "data", "core", "ml", "ai", "decision", "risk", "signal_engine", "paper_trading", "execution", "plugins"]
omit = [
    "connectors/binance_connector.py",
    "connectors/psx_connector.py",
    "connectors/pmex_connector.py",
    "connectors/base.py",
    "connectors/market_registry.py",
    "connectors/normalizer.py",
    "connectors/metadata.py",
    "connectors/capabilities.py",
    "connectors/health.py",
    "core/indicators.py",
    "core/sentiment.py",
    "core/llm_analyzer.py",
]
branch = true

[tool.coverage.report]
fail_under = 88
show_missing = true

[tool.importlinter]
root_packages = [
    "models",
    "config",
    "historical",
    "market_data",
    "feature_engineering",
    "feature_store",
    "training_pipeline",
    "model_registry",
    "inference_pipeline",
    "ml_runtime",
    "ml_engine_plugins",
    "framework_adapters",
    "artifact_management",
    "storage_providers",
    "connectors",
    "events",
