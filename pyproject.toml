[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trading-platform"
version = "0.1.0"
description = "Enterprise Autonomous AI Trading Intelligence Platform"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "PyYAML>=6.0.2",
    "python-dotenv>=1.0.0",
    "numpy>=1.24.0",
    "onnxruntime>=1.17.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-cov>=6.0.0",
    "mypy>=1.14.0",
    "ruff>=0.9.0",
    "black>=24.10.0",
    "types-PyYAML>=6.0.12",
    "import-linter>=2.1",
    "pre-commit>=4.0.0",
    "onnx>=1.16.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["models*", "config*", "historical*", "market_data*", "feature_engineering*", "feature_store*", "training_pipeline*", "model_registry*", "inference_pipeline*", "ml_runtime*", "ml_engine_plugins*", "framework_adapters*", "artifact_management*", "storage_providers*", "connectors*", "events*", "versioning*", "audit*", "feature_flags*", "research*", "architecture*", "health*", "metrics*", "platform_logging*", "security*", "notifications*", "monitoring*", "services*", "pipeline*", "workflow*", "data*", "core*", "ml*", "ai*", "decision*", "risk*", "signal_engine*", "paper_trading*", "execution*", "plugins*"]

[tool.black]
line-length = 100
target-version = ["py314"]
extend-exclude = "tests/test_llm_analyzer.py"

[tool.ruff]
line-length = 100
target-version = "py314"
exclude = [
    "connectors/binance_connector.py",
    "connectors/psx_connector.py",
    "connectors/pmex_connector.py",
    "core/indicators.py",
    "core/sentiment.py",
    "core/llm_analyzer.py",
    "main.py",
    "dashboard.py",
    "config.py",
    "tests/test_llm_analyzer.py",
]

[tool.ruff.lint]
select = [
    "E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH", "PTH", "RUF",
]

[tool.mypy]
python_version = "3.14"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
no_implicit_optional = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
explicit_package_bases = true
mypy_path = "."
packages = ["models", "config", "historical", "market_data", "feature_engineering", "feature_store", "training_pipeline", "model_registry", "inference_pipeline", "ml_runtime", "ml_engine_plugins", "framework_adapters", "artifact_management", "storage_providers", "connectors", "events", "versioning", "audit", "feature_flags", "research", "architecture", "health", "metrics", "platform_logging", "security", "notifications", "monitoring", "services", "pipeline", "workflow", "data", "core", "ml", "ai", "decision", "risk", "signal_engine", "paper_trading", "execution", "plugins"]
exclude = ["connectors/binance_connector\\.py", "connectors/psx_connector\\.py", "connectors/pmex_connector\\.py", "core/indicators\\.py", "core/sentiment\\.py", "core/llm_analyzer\\.py"]

[[tool.mypy.overrides]]
module = "yaml.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "onnxruntime.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests/unit", "tests/ml", "tests/ai", "tests/decision", "tests/risk", "tests/signal_engine", "tests/paper_trading", "tests/execution", "tests/connectors", "tests/paper", "tests/historical", "tests/market_data", "tests/feature_engineering", "tests/feature_store", "tests/training_pipeline", "tests/model_registry", "tests/inference_pipeline", "tests/ml_runtime", "tests/ml_engine_plugins", "tests/framework_adapters", "tests/artifact_management", "tests/storage_providers", "tests/contract", "tests/architecture", "tests/integration"]
pythonpath = ["."]
addopts = "-ra --strict-markers"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "validation: Validation script tests",
    "contract: Contract tests",
    "architecture: Architecture validation tests",
]

[tool.ruff.lint.per-file-ignores]
"models/**/*.py" = ["TC001"]
"connectors/**/*.py" = ["TC001", "TC003", "A004"]
"historical/**/*.py" = ["TC001", "TC003"]
"market_data/**/*.py" = ["TC001", "TC003"]
"feature_engineering/**/*.py" = ["TC001", "TC003"]
"feature_store/**/*.py" = ["TC001", "TC003"]
"training_pipeline/**/*.py" = ["TC001", "TC003"]
"model_registry/**/*.py" = ["TC001", "TC003"]
"inference_pipeline/**/*.py" = ["TC001", "TC003"]
"ml_runtime/**/*.py" = ["TC001", "TC003"]
"ml_engine_plugins/**/*.py" = ["TC001", "TC003"]
"framework_adapters/**/*.py" = ["TC001", "TC003"]
"artifact_management/**/*.py" = ["TC001", "TC003"]
"storage_providers/**/*.py" = ["TC001", "TC003"]
"connectors/exceptions.py" = ["A001", "TC001"]
"tests/**/*.py" = ["TC001"]
"tests/architecture/**/*.py" = ["TC001"]
"feature_flags/**/*.py" = ["TC001"]
"research/**/*.py" = ["TC001"]
"events/**/*.py" = ["TC001", "TC003"]
"audit/**/*.py" = ["TC001", "TC003"]
"versioning/**/*.py" = ["TC001"]
"architecture/**/*.py" = ["TC001", "TC003"]
"health/**/*.py" = ["TC001", "TC003"]
"metrics/**/*.py" = ["TC001", "TC003"]
"platform_logging/**/*.py" = ["TC001", "TC003"]
