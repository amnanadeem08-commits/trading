# Development compose — foundation scaffold only (no Redis, PostgreSQL, Kafka)
services:
  platform-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    environment:
      ENVIRONMENT: development
      APP_NAME: trading-platform
      SCHEMA_VERSION: "1.0.0"
      TIMEZONE_INTERNAL: UTC
    command: ["python", "scripts/dev.py", "test"]
